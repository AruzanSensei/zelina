<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zanxa AI</title>
    <meta name="description" content="Zanxa AI — Your intelligent assistant powered by Gemini.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <meta name="theme-color" content="#000000">
    <script type="application/ld+json">
        {
          "@context": "https://schema.org",
          "@type": "Organization",
          "name": "Zanxa AI",
          "url": "https://chat.zanxa.site",
          "logo": "https://chat.zanxa.site/favicon.png"
        }
    </script>
</head>

<body>

    <!-- App Layout -->
    <div class="app-layout">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <!-- <div class="brand-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 8V4H8"></path>
                            <rect width="16" height="12" x="4" y="8" rx="2"></rect>
                            <path d="M2 14h2"></path>
                            <path d="M20 14h2"></path>
                            <path d="M15 13v2"></path>
                            <path d="M9 13v2"></path>
                        </svg>
                    </div> -->
                    <span class="brand-name">Zanxa AI</span>
                </div>
                <button class="icon-btn" id="new-chat-btn" title="New Chat" aria-label="New Chat">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14" />
                    </svg>
                </button>
            </div>

            <div class="sidebar-content">
                <p class="sidebar-label">Riwayat Chat</p>
                <div class="chat-history" id="chat-history">
                    <div class="history-empty">
                        <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor"
                            stroke-width="1.5">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                        </svg>
                        <p>Belum ada percakapan</p>
                    </div>
                </div>
            </div>

            <div class="sidebar-footer">
                <p style="font-size: 10px; color: var(--text-secondary); opacity: 0.5; text-align: center;">Zanxa AI
                    v2.0</p>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <div class="chat-area">

            <!-- Top Bar -->
            <header class="topbar">
                <button class="icon-btn" id="sidebar-toggle" aria-label="Toggle Sidebar">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <line x1="3" y1="12" x2="21" y2="12" />
                        <line x1="3" y1="18" x2="21" y2="18" />
                    </svg>
                </button>
                <div class="topbar-center">
                    <div class="model-selector" id="model-selector">
                        <button class="model-selected">
                            <span class="model-name">Gemini 2.5 Flash</span>
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="m6 9 6 6 6-6" />
                            </svg>
                        </button>
                        <div class="model-dropdown">
                            <div class="model-option active" data-model="gemini-2.5-flash">
                                <span class="opt-name">Gemini 2.5 Flash</span>
                                <span class="tag free">Free</span>
                            </div>
                            <div class="model-option">
                                <span class="opt-name">Sawit AI</span>
                                <span class="tag free">Free</span>
                            </div>
                            <div class="model-option locked">
                                <span class="opt-name">Claude 3.5 Sonnet</span>
                                <span class="tag pro">Pro</span>
                            </div>
                            <div class="model-option locked">
                                <span class="opt-name">GPT-4o</span>
                                <span class="tag pro">Pro</span>
                            </div>
                            <div class="model-option locked">
                                <span class="opt-name">DeepSeek R1</span>
                                <span class="tag pro">Pro</span>
                            </div>
                        </div>
                    </div>
                </div>
                <button class="icon-btn" id="theme-toggle" title="Ubah Tema" aria-label="Ubah Tema">
                    <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <circle cx="12" cy="12" r="5" />
                        <line x1="12" y1="1" x2="12" y2="3" />
                        <line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                    </svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"
                        style="display:none">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                    </svg>
                </button>
            </header>

            <!-- Messages -->
            <main class="messages-container" id="messages-container">

                <!-- Welcome / Empty State -->
                <div class="welcome-screen" id="welcome-screen">
                    <!-- <div class="welcome-icon">
                        <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 8V4H8"></path>
                            <rect width="16" height="12" x="4" y="8" rx="2"></rect>
                            <path d="M2 14h2"></path>
                            <path d="M20 14h2"></path>
                            <path d="M15 13v2"></path>
                            <path d="M9 13v2"></path>
                        </svg>
                    </div> -->
                    <h1></h1>
                    <p class="welcome-sub">Tanyakan apa saja
                    </p>
                </div>

                <!-- Chat Messages -->
                <div class="messages-list" id="messages-list"></div>

            </main>

            <!-- Input Area -->
            <footer class="input-area">
                <div class="input-wrapper">
                    <textarea id="message-input" class="message-input" placeholder="Ketik pesan..." rows="1"
                        aria-label="Chat input"></textarea>
                    <button class="send-btn" id="send-btn" aria-label="Kirim pesan" disabled>
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                        </svg>
                    </button>
                </div>
                <p class="input-disclaimer">Zanxa AI dapat membuat kesalahan.
                </p>
            </footer>

        </div>
    </div>

    <!-- Marked.js and Highlight.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
