<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taskflow — Todo Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="mode-editor">

<!-- ══ TOPBAR ══ -->
<header id="topbar">
  <div class="topbar-left">
    <span class="logo">✦ Taskflow</span>
  </div>

  <div class="mode-switch" id="mode-switch">
    <button class="mode-btn active" data-mode="editor">
      <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="8" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="1" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="8" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/></svg>
      Editor
    </button>
    <button class="mode-btn" data-mode="wall">
      <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><rect x="2" y="1" width="10" height="12" rx="1" stroke="currentColor" stroke-width="1.4"/><path d="M4 4h6M4 7h6M4 10h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      Wall Print
    </button>
  </div>

  <div class="topbar-right">
    <button id="btn-settings" class="icon-btn" title="Pengaturan" aria-label="Pengaturan">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    </button>
    <button id="btn-print" class="action-btn action-btn--primary">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="3" y="1" width="10" height="8" rx="1" stroke="currentColor" stroke-width="1.4"/><path d="M3 9H1.5A.5.5 0 001 9.5v5a.5.5 0 00.5.5h13a.5.5 0 00.5-.5v-5a.5.5 0 00-.5-.5H13" stroke="currentColor" stroke-width="1.4"/><rect x="4" y="11" width="8" height="4" rx=".5" stroke="currentColor" stroke-width="1.4"/><circle cx="12.5" cy="10.5" r=".75" fill="currentColor"/></svg>
      Print / PDF
    </button>
  </div>
</header>

<!-- ══ SETTINGS ══ -->
<div id="settings-panel" class="settings-panel hidden">
  <div class="settings-inner">
    <div class="settings-header">
      <span class="settings-title">Pengaturan</span>
      <button id="settings-close" class="icon-btn">✕</button>
    </div>
    <div class="settings-group">
      <div class="settings-label">Judul Dokumen</div>
      <input type="text" id="doc-title" class="settings-input" value="TODO LIST" placeholder="Judul">
    </div>
    <div class="settings-group">
      <div class="settings-label">Subjudul / Periode</div>
      <input type="text" id="doc-subtitle" class="settings-input" placeholder="Q3 2025 · Personal">
    </div>

    <div class="settings-divider">Editor</div>
    <div id="editor-settings">
      <div class="settings-group">
        <div class="settings-label">Warna Aksen</div>
        <div class="color-row">
          <input type="text" id="color-accent-text" class="settings-input mono" value="#111111" maxlength="9">
          <div class="color-swatch" id="csw-accent"><input type="color" id="color-accent-picker" value="#111111"></div>
        </div>
      </div>
      <div class="settings-group">
        <div class="settings-label">Warna Header</div>
        <div class="color-row">
          <input type="text" id="color-header-text" class="settings-input mono" value="#F5F0EB" maxlength="9">
          <div class="color-swatch" id="csw-header"><input type="color" id="color-header-picker" value="#F5F0EB"></div>
        </div>
      </div>
      <div class="settings-group">
        <div class="settings-label">Kolom Grid</div>
        <div class="radio-group">
          <label class="radio-option"><input type="radio" name="col-layout" value="1"> 1 Kolom</label>
          <label class="radio-option"><input type="radio" name="col-layout" value="2" checked> 2 Kolom</label>
        </div>
      </div>
      <div class="settings-group">
        <div class="settings-label">Ukuran Font Item</div>
        <div class="range-row">
          <input type="range" id="font-size-range" min="11" max="18" value="13" class="range-input">
          <span id="font-size-label" class="range-label">13px</span>
        </div>
      </div>
      <div class="settings-group">
        <div class="settings-label">Progress bar</div>
        <label class="toggle-label">
          <input type="checkbox" id="show-progress" checked>
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          <span class="toggle-text">Tampilkan</span>
        </label>
      </div>
    </div>

    <div class="settings-divider">Wall Print</div>
    <div id="wall-settings">
      <div class="settings-group">
        <div class="settings-label">Tema Warna</div>
        <div class="radio-group">
          <label class="radio-option"><input type="radio" name="wall-theme" value="light" checked>
            <span class="theme-swatch" style="background:#fff;border:1px solid #ccc"></span> Putih
          </label>
          <label class="radio-option"><input type="radio" name="wall-theme" value="gray">
            <span class="theme-swatch" style="background:#d4d4d4"></span> Abu-abu
          </label>
          <label class="radio-option"><input type="radio" name="wall-theme" value="dark">
            <span class="theme-swatch" style="background:#111"></span> Hitam
          </label>
        </div>
      </div>
      <div class="settings-group">
        <div class="settings-label">Max sub-item per halaman</div>
        <div class="range-row">
          <input type="range" id="items-per-page" min="4" max="18" value="10" class="range-input">
          <span id="ipp-label" class="range-label">10</span>
        </div>
        <div class="settings-hint">Kontrol agar sub-item tidak terpotong antar halaman</div>
      </div>
    </div>
  </div>
</div>
<div id="settings-overlay" class="settings-overlay hidden"></div>

<!-- ══ EDITOR VIEW ══ -->
<div id="editor-view">
  <div class="toolbar">
    <div class="toolbar-left">
      <span class="toolbar-stat" id="stat-total">0 item</span>
      <span class="toolbar-dot">·</span>
      <span class="toolbar-stat" id="stat-done">0 selesai</span>
    </div>
    <div class="toolbar-right">
      <button class="tool-btn" id="btn-add-page">
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><rect x="2" y="1" width="8" height="11" rx="1" stroke="currentColor" stroke-width="1.3"/><path d="M10 4h2M11 3v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        Halaman
      </button>
      <button class="tool-btn" id="btn-add-group">
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M7 2v10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Group
      </button>
    </div>
  </div>
  <div id="pages-container"></div>
</div>

<!-- ══ WALL PRINT VIEW ══ -->
<div id="wall-view" class="hidden"></div>

<div id="toast" class="toast"></div>
<script src="main.js"></script>
</body>
</html>
