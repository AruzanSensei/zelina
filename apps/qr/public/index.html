<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ETS Asset Tracking — Industrial QR System</title>
  <meta name="description" content="Sistem tracking aset industri ETS menggunakan QR Code. Scan QR untuk melihat spesifikasi teknis produk.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/public.css">
</head>
<body class="public-page">
  <div class="noise"></div>

  <header class="site-header">
    <a href="../index.html">
      <img src="../assets/ets-logo.png" alt="ETS" class="site-logo">
    </a>
    <span class="tagline" id="admin-link" title="Admin Panel">Admin</span>
  </header>

  <div class="landing-main">
    <!-- Hero -->
    <div class="hero">
      <div style="font-family:var(--pub-mono);font-size:.65rem;letter-spacing:.2em;color:var(--ink3);margin-bottom:12px;">INDUSTRIAL ASSET TRACKING v2.0</div>
      <h1 style="font-size:clamp(2rem,5vw,3.2rem);font-weight:800;line-height:1.05;letter-spacing:-.02em;margin-bottom:14px;">
        Verifikasi Aset<br>via QR Code
      </h1>
      <div class="hero-sub">Masukkan nomor seri atau scan QR produk ETS untuk melihat spesifikasi teknis lengkap.</div>
    </div>

    <!-- Search -->
    <div class="search-card">
      <div class="search-label">CARI NOMOR SERI / ID PRODUK</div>
      <div class="search-row">
        <input class="id-input" id="search-id" type="text" placeholder="SN-UPS-20240101" autocomplete="off" spellcheck="false">
        <button class="go-btn" id="btn-go">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 7h10M8 3l4 4-4 4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          CARI
        </button>
      </div>
      <div class="search-error" id="search-error"></div>
    </div>

    <!-- Demo grid -->
    <div class="demo-section">
      <div class="demo-label">PRODUK TERDAFTAR</div>
      <div class="demo-grid" id="demo-grid">
        <div class="demo-item sk" style="height:80px;"></div>
        <div class="demo-item sk" style="height:80px;"></div>
        <div class="demo-item sk" style="height:80px;"></div>
      </div>
      <button class="see-more-btn hidden" id="btn-see-more">Lihat lebih banyak ↓</button>
    </div>

    <!-- QR section -->
    <div class="qr-section">
      <div class="section-label">QR CODE PRODUK</div>
      <div class="qr-cards" id="qr-cards">
        <div class="qr-card sk" style="height:120px;"></div>
        <div class="qr-card sk" style="height:120px;"></div>
        <div class="qr-card sk" style="height:120px;"></div>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <span>© 2024 ETS — Industrial Asset Tracking</span>
    <span class="footer-domain">qr.zanxa.site</span>
  </footer>

  <script src="../config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="../scripts/public/index.js"></script>
</body>
</html>
