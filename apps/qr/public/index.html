<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ETS Asset Tracking — Industrial QR System</title>
  <meta name="description"
    content="Sistem tracking aset industri ETS menggunakan QR Code. Scan QR untuk melihat spesifikasi teknis produk.">

  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/public.css">
  <link rel="stylesheet" href="../styles/scanner.css">
</head>

<body>

  <header class="site-header">
    <a href="../index.html">
      <img src="../assets/ets-logo.png" alt="ETS" class="site-logo">
    </a>
    <span class="tagline" id="admin-link" title="Admin Panel">
      <i data-lucide="user-lock" style="width: 18px; height: 18px;"></i> Admin
    </span>
  </header>

  <div class="landing-main">
    <!-- Hero -->
    <div class="hero">
      <div class="hero-eyebrow">INDUSTRIAL ASSET TRACKING v2.0</div>
      <h1
        style="font-size:clamp(2rem,5vw,3rem);font-weight:700;line-height:1.05;letter-spacing:-.02em;margin-bottom:14px;color:var(--text-main);">
        Verifikasi Aset<br>via QR Code
      </h1>
      <div class="hero-sub">Masukkan nomor seri atau scan QR produk ETS untuk melihat spesifikasi teknis lengkap.</div>
    </div>

    <!-- Search -->
    <div class="search-card">
      <div class="search-label">CARI NOMOR SERI / ID PRODUK</div>
      <div class="search-row">
        <input class="id-input" id="search-id" type="text" placeholder="SN-UPS-20240101" autocomplete="off"
          spellcheck="false">
        <button class="go-btn" id="btn-go">
          CARI
        </button>
      </div>
      <div class="search-error" id="search-error"></div>
      <!-- Scan trigger button injected here by scanner.js -->
    </div>

    <!-- Demo grid -->
    <div class="demo-section">
      <div class="demo-label">PRODUK TERDAFTAR</div>
      <div class="demo-grid" id="demo-grid">
        <div class="demo-item sk" style="height:80px;"></div>
        <div class="demo-item sk" style="height:80px;"></div>
        <div class="demo-item sk" style="height:80px;"></div>
      </div>
      <button class="see-more-btn hidden" id="btn-see-more">Lihat lebih banyak ↓</button>
    </div>

    <!-- QR section -->
    <div class="qr-section">
      <div class="section-label">QR CODE PRODUK</div>
      <div class="qr-cards" id="qr-cards">
        <div class="qr-card sk" style="height:120px;"></div>
        <div class="qr-card sk" style="height:120px;"></div>
        <div class="qr-card sk" style="height:120px;"></div>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <span>© 2026 ETS — Industrial Asset Tracking</span>
    <span class="footer-domain">qr.zanxa.site</span>
  </footer>

  <script src="../config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- QR Scanner library (Nimiq) — UMD build, ~50kb, no backend needed -->
  <script src="https://unpkg.com/qr-scanner@1.4.2/qr-scanner.umd.min.js"></script>
  <script src="../components/qr-generator.js"></script>
  <script src="../scripts/public/index.js"></script>
  <script src="../scripts/public/scanner.js"></script>
  <script>
    if (window.lucide) {
      lucide.createIcons();
    }
    // Admin link → navigate to admin panel
    document.getElementById('admin-link').addEventListener('click', () => {
      window.location.href = '../admin/login.html';
    });
  </script>
</body>

</html>
