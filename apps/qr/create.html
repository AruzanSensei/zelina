<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tambah Produk — QR Zanxa</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
</head>

<body class="product-page">

  <div class="noise"></div>

  <header class="site-header">
    <a href="index.html" class="logo">QR<span class="accent">.</span>ZANXA</a>
    <a href="index.html" class="back-link">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <path d="M13 8H3M7 4l-4 4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
          stroke-linejoin="round" />
      </svg>
      Kembali
    </a>
  </header>

  <main class="create-main">
    <div class="hero-label">MANAJEMEN PRODUK</div>
    <h1 class="create-title">Tambah Produk Baru</h1>
    <p class="create-sub">ISI SEMUA FIELD · GAMBAR DIUPLOAD KE SUPABASE STORAGE</p>

    <!-- IDENTITAS -->
    <div class="form-section">
      <div class="form-section-title">IDENTITAS PRODUK</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label" for="f-id">ID PRODUK *</label>
          <input class="form-input" id="f-id" type="text" placeholder="UPS004" maxlength="20" />
        </div>
        <div class="form-group">
          <label class="form-label" for="f-nama">NAMA PRODUK *</label>
          <input class="form-input" id="f-nama" type="text" placeholder="PowerShield Ultra 5000" />
        </div>
        <div class="form-group">
          <label class="form-label" for="f-tipe">TIPE / KODE *</label>
          <input class="form-input" id="f-tipe" type="text" placeholder="Online Double Conversion" />
        </div>
        <div class="form-group">
          <label class="form-label" for="f-seri">NOMOR SERI *</label>
          <input class="form-input" id="f-seri" type="text" placeholder="SN-XXXX-20240101" />
        </div>
        <div class="form-group">
          <label class="form-label" for="f-tahun">TAHUN PEMBUATAN *</label>
          <input class="form-input" id="f-tahun" type="number" placeholder="2024" min="2000" max="2099" />
        </div>
        <div class="form-group">
          <label class="form-label" for="f-status">STATUS *</label>
          <select class="form-select" id="f-status">
            <option value="aktif">Aktif</option>
            <option value="tidak aktif">Tidak Aktif</option>
          </select>
        </div>
      </div>
    </div>

    <!-- SPESIFIKASI TEKNIS -->
    <div class="form-section">
      <div class="form-section-title">SPESIFIKASI TEKNIS</div>
      <div class="form-grid">
        <div class="form-group full">
          <label class="form-label" for="f-input">INPUT</label>
          <input class="form-input" id="f-input" type="text" placeholder="220V AC / 50Hz, Single Phase" />
        </div>
        <div class="form-group full">
          <label class="form-label" for="f-output">OUTPUT</label>
          <input class="form-input" id="f-output" type="text" placeholder="220V AC ±2%, Pure Sine Wave" />
        </div>
        <div class="form-group">
          <label class="form-label" for="f-frekuensi">FREKUENSI</label>
          <input class="form-input" id="f-frekuensi" type="text" placeholder="50Hz / 60Hz (Auto)" />
        </div>
        <div class="form-group">
          <label class="form-label" for="f-socket">JUMLAH SOCKET</label>
          <input class="form-input" id="f-socket" type="number" placeholder="6" min="1" max="99" />
        </div>
        <div class="form-group full">
          <label class="form-label" for="f-spesifikasi">TAMBAHAN / OPSIONAL</label>
          <textarea class="form-textarea" id="f-spesifikasi"
            placeholder="Kapasitas, fitur tambahan, catatan, dll..."></textarea>
        </div>
      </div>
    </div>

    <!-- GAMBAR COVER -->
    <div class="form-section">
      <div class="form-section-title">GAMBAR COVER</div>
      <div class="img-upload-slot cover-slot" id="slot-cover">
        <img class="img-slot-preview" id="prev-cover" alt="Cover" />
        <div class="img-slot-placeholder" id="ph-cover">
          <svg class="img-slot-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <path d="M21 15l-5-5L5 21" />
          </svg>
          <span class="img-slot-lbl">COVER UTAMA<br />Klik untuk upload</span>
        </div>
        <input class="img-slot-input" type="file" accept="image/*" onchange="handleImg(this,'cover')" />
      </div>
    </div>

    <!-- FOTO PRODUK -->
    <div class="form-section">
      <div class="form-section-title">FOTO PRODUK</div>
      <div class="img-grid">
        <div class="form-group">
          <label class="form-label">GAMBAR DEPAN</label>
          <div class="img-upload-slot" id="slot-depan">
            <img class="img-slot-preview" id="prev-depan" alt="Depan" />
            <div class="img-slot-placeholder" id="ph-depan">
              <svg class="img-slot-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2" />
                <circle cx="8.5" cy="8.5" r="1.5" />
                <path d="M21 15l-5-5L5 21" />
              </svg>
              <span class="img-slot-lbl">DEPAN</span>
            </div>
            <input class="img-slot-input" type="file" accept="image/*" onchange="handleImg(this,'depan')" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">SAMPING KANAN</label>
          <div class="img-upload-slot" id="slot-kanan">
            <img class="img-slot-preview" id="prev-kanan" alt="Samping Kanan" />
            <div class="img-slot-placeholder" id="ph-kanan">
              <svg class="img-slot-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2" />
                <circle cx="8.5" cy="8.5" r="1.5" />
                <path d="M21 15l-5-5L5 21" />
              </svg>
              <span class="img-slot-lbl">SAMPING KANAN</span>
            </div>
            <input class="img-slot-input" type="file" accept="image/*" onchange="handleImg(this,'kanan')" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">SAMPING KIRI</label>
          <div class="img-upload-slot" id="slot-kiri">
            <img class="img-slot-preview" id="prev-kiri" alt="Samping Kiri" />
            <div class="img-slot-placeholder" id="ph-kiri">
              <svg class="img-slot-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2" />
                <circle cx="8.5" cy="8.5" r="1.5" />
                <path d="M21 15l-5-5L5 21" />
              </svg>
              <span class="img-slot-lbl">SAMPING KIRI</span>
            </div>
            <input class="img-slot-input" type="file" accept="image/*" onchange="handleImg(this,'kiri')" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">GAMBAR BELAKANG</label>
          <div class="img-upload-slot" id="slot-belakang">
            <img class="img-slot-preview" id="prev-belakang" alt="Belakang" />
            <div class="img-slot-placeholder" id="ph-belakang">
              <svg class="img-slot-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2" />
                <circle cx="8.5" cy="8.5" r="1.5" />
                <path d="M21 15l-5-5L5 21" />
              </svg>
              <span class="img-slot-lbl">BELAKANG</span>
            </div>
            <input class="img-slot-input" type="file" accept="image/*" onchange="handleImg(this,'belakang')" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">GAMBAR DALAM</label>
          <div class="img-upload-slot" id="slot-dalam">
            <img class="img-slot-preview" id="prev-dalam" alt="Dalam" />
            <div class="img-slot-placeholder" id="ph-dalam">
              <svg class="img-slot-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2" />
                <circle cx="8.5" cy="8.5" r="1.5" />
                <path d="M21 15l-5-5L5 21" />
              </svg>
              <span class="img-slot-lbl">DALAM</span>
            </div>
            <input class="img-slot-input" type="file" accept="image/*" onchange="handleImg(this,'dalam')" />
          </div>
        </div>
      </div>
    </div>

    <!-- SUBMIT -->
    <div class="submit-row">
      <button class="btn-submit" id="btn-save" onclick="saveToSupabase()">SIMPAN KE SUPABASE</button>
      <button class="btn-reset" onclick="resetForm()">RESET</button>
    </div>

    <!-- STATUS FEEDBACK -->
    <div id="save-status"
      style="display:none;margin-top:20px;padding:16px 20px;border-radius:10px;font-family:var(--mono);font-size:0.8rem;letter-spacing:0.05em;line-height:1.6;">
    </div>
  </main>

  <footer class="site-footer">
    <span>© 2024 Zanxa — MVP Demo</span>
    <span class="footer-domain">qr.zanxa.site</span>
  </footer>

  <script>
    // ── KONFIGURASI SUPABASE ───────────────────────────────────────
    const SUPABASE_URL   = 'https://cxtmilenczpjetlnqiwo.supabase.co';
    const SUPABASE_KEY   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN4dG1pbGVuY3pwamV0bG5xaXdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTEzMTUsImV4cCI6MjA5Mjc4NzMxNX0.OpTsBgQACFzE4ipIuOiTFaf-ldscH_hnTDQdY0U52AY';
    const STORAGE_BUCKET = 'product-images'; // Nama bucket di Supabase Storage
    // ──────────────────────────────────────────────────────────────

    // images[key] = File object (bukan base64)
    const images = {};

    function handleImg(input, key) {
      const file = input.files[0];
      if (!file) return;
      images[key] = file; // simpan File object untuk upload nanti

      // Preview instan via object URL (jauh lebih cepat dari FileReader)
      const prev = document.getElementById('prev-' + key);
      const ph   = document.getElementById('ph-' + key);
      prev.src = URL.createObjectURL(file);
      prev.classList.add('visible');
      ph.classList.add('hidden');
    }

    function val(id) {
      return document.getElementById(id).value.trim();
    }

    function showStatus(type, message) {
      const el = document.getElementById('save-status');
      el.style.display = 'block';
      const styles = {
        loading: { bg: 'var(--bg2)',      border: 'var(--border)', color: 'var(--ink2)' },
        success: { bg: 'var(--green-bg)', border: 'var(--green)',  color: 'var(--green)' },
        error:   { bg: 'var(--red-bg)',   border: 'var(--accent)', color: 'var(--accent)' },
      };
      const s = styles[type];
      el.style.background = s.bg;
      el.style.border     = '1px solid ' + s.border;
      el.style.color      = s.color;
      el.innerHTML        = message;
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ── Upload semua gambar ke Supabase Storage (paralel) ─────────
    async function uploadImages(productId) {
      const entries = Object.entries(images).filter(([, f]) => f instanceof File);
      if (!entries.length) return {};

      const results = await Promise.all(entries.map(async ([key, file]) => {
        const ext  = (file.name.split('.').pop() || 'jpg').toLowerCase();
        const path = productId + '/' + key + '.' + ext;

        const res = await fetch(
          SUPABASE_URL + '/storage/v1/object/' + STORAGE_BUCKET + '/' + path,
          {
            method:  'POST',
            headers: {
              'apikey':        SUPABASE_KEY,
              'Authorization': 'Bearer ' + SUPABASE_KEY,
              'Content-Type':  file.type || 'image/jpeg',
              'x-upsert':      'true',
            },
            body: file,
          }
        );

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error('Upload "' + key + '" gagal: ' + (err.message || res.status));
        }

        const publicUrl =
          SUPABASE_URL + '/storage/v1/object/public/' + STORAGE_BUCKET + '/' + path;
        return [key, publicUrl];
      }));

      return Object.fromEntries(results);
    }
    // ─────────────────────────────────────────────────────────────

    async function saveToSupabase() {
      const id = val('f-id').toUpperCase();
      if (!id || !val('f-nama') || !val('f-tipe') || !val('f-seri') || !val('f-tahun')) {
        showStatus('error', '&#x2715; <strong>Gagal:</strong> Lengkapi field wajib: ID, Nama, Tipe, No. Seri, Tahun.');
        return;
      }

      const btn = document.getElementById('btn-save');
      btn.disabled    = true;
      btn.textContent = 'MENYIMPAN...';

      try {
        // ── Langkah 1: Upload gambar ke Storage ─────────────────
        const imgCount = Object.keys(images).length;
        if (imgCount > 0) {
          showStatus('loading',
            '&#x23F3; Mengupload <strong>' + imgCount + ' gambar</strong> ke Storage...');
        } else {
          showStatus('loading', '&#x23F3; Menyimpan data produk <strong>' + id + '</strong>...');
        }

        const imageUrls = await uploadImages(id);

        // ── Langkah 2: Simpan data ke database ──────────────────
        if (imgCount > 0) {
          showStatus('loading', '&#x23F3; Menyimpan data produk <strong>' + id + '</strong>...');
        }

        const payload = {
          id,
          nama_produk:          val('f-nama'),
          tipe:                 val('f-tipe'),
          tahun_pembuatan:      parseInt(val('f-tahun')) || null,
          nomor_seri:           val('f-seri'),
          input:                val('f-input')      || null,
          output:               val('f-output')     || null,
          frekuensi:            val('f-frekuensi')  || null,
          jumlah_socket:        val('f-socket') ? parseInt(val('f-socket')) : null,
          spesifikasi:          val('f-spesifikasi') || null,
          status:               document.getElementById('f-status').value,
          // URL dari Supabase Storage (bukan base64)
          gambar_cover:         imageUrls['cover']    || null,
          gambar_depan:         imageUrls['depan']    || null,
          gambar_samping_kanan: imageUrls['kanan']    || null,
          gambar_samping_kiri:  imageUrls['kiri']     || null,
          gambar_belakang:      imageUrls['belakang'] || null,
          gambar_dalam:         imageUrls['dalam']    || null,
        };

        const res = await fetch(SUPABASE_URL + '/rest/v1/products', {
          method:  'POST',
          headers: {
            'apikey':        SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type':  'application/json',
            'Prefer':        'resolution=merge-duplicates,return=representation'
          },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.message || err.hint || 'HTTP ' + res.status);
        }

        const uploadedCount = Object.keys(imageUrls).length;
        showStatus('success',
          '&#x2713; <strong>Berhasil!</strong> Produk <strong>' + id + '</strong> tersimpan.' +
          (uploadedCount > 0 ? ' ' + uploadedCount + ' gambar di Storage.' : '') +
          ' &nbsp;<a href="product.html?id=' + id + '" style="color:var(--green);text-decoration:underline">Lihat produk &#x2192;</a>'
        );

      } catch (e) {
        showStatus('error', '&#x2715; <strong>Gagal:</strong> ' + (e.message || 'Terjadi kesalahan jaringan.'));
      } finally {
        btn.disabled    = false;
        btn.textContent = 'SIMPAN KE SUPABASE';
      }
    }

    function resetForm() {
      ['f-id','f-nama','f-tipe','f-seri','f-tahun','f-input','f-output','f-frekuensi','f-socket','f-spesifikasi']
        .forEach(id => document.getElementById(id).value = '');
      document.getElementById('f-status').value = 'aktif';
      Object.keys(images).forEach(k => delete images[k]);
      ['cover','depan','kanan','kiri','belakang','dalam'].forEach(k => {
        const prev = document.getElementById('prev-' + k);
        const ph   = document.getElementById('ph-' + k);
        if (prev) { prev.src = ''; prev.classList.remove('visible'); }
        if (ph)   ph.classList.remove('hidden');
      });
      document.getElementById('save-status').style.display = 'none';
    }
  </script>
</body>

</html>
