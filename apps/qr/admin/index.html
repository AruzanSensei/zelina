<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — ETS Admin</title>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside id="sidebar"></aside>
    <div class="admin-main">
      <header class="topbar">
        <button class="topbar__ham" id="ham-btn" aria-label="Toggle sidebar"></button>
        <span class="topbar__title">Dashboard</span>
        <div class="topbar__user">
          <div class="topbar__avatar" id="user-avatar">?</div>
          <span id="user-email">—</span>
        </div>
      </header>
      <main class="page-content">
        <div class="page-header">
          <h1>Dashboard</h1>
          <p>Selamat datang kembali. Berikut ringkasan sistem ETS Asset Tracking.</p>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="stats-grid">
          <div class="stat-card">
            <div class="stat-card__icon">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6">
                <rect x="1" y="3" width="16" height="13" rx="1.5"/>
                <path d="M5 3V2a2 2 0 0 1 4 0v1"/>
              </svg>
            </div>
            <div class="stat-card__label">Total Produk</div>
            <div class="stat-card__value sk" id="stat-products" style="height:40px;width:80px;">&nbsp;</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__icon">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6">
                <rect x="1" y="1" width="6" height="6" rx="1"/>
                <rect x="11" y="1" width="6" height="6" rx="1"/>
                <rect x="1" y="11" width="6" height="6" rx="1"/>
                <path d="M11 13h2m2 0h2M13 11v2m0 2v2"/>
              </svg>
            </div>
            <div class="stat-card__label">Total QR Generated</div>
            <div class="stat-card__value sk" id="stat-qr" style="height:40px;width:80px;">&nbsp;</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__icon">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6">
                <path d="M2 12l3-3 3 2.5 3-4 3 2"/>
              </svg>
            </div>
            <div class="stat-card__label">Total Scan</div>
            <div class="stat-card__value sk" id="stat-scans" style="height:40px;width:80px;">&nbsp;</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__icon">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6">
                <circle cx="9" cy="9" r="7"/>
                <path d="M9 5v4l3 2"/>
              </svg>
            </div>
            <div class="stat-card__label">Scan Hari Ini</div>
            <div class="stat-card__value sk" id="stat-today" style="height:40px;width:80px;">&nbsp;</div>
          </div>
        </div>

        <!-- Quick actions -->
        <div class="quick-actions">
          <a href="products.html?action=create" class="btn btn-primary">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 1v12M1 7h12" stroke-linecap="round"/></svg>
            Tambah Produk
          </a>
          <a href="qrcodes.html" class="btn btn-outline">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1" y="1" width="5" height="5" rx="1"/><rect x="8" y="1" width="5" height="5" rx="1"/><rect x="1" y="8" width="5" height="5" rx="1"/><path d="M8 10h2m2 0h2M10 8v2m0 2v2"/></svg>
            Download QR
          </a>
          <a href="analytics.html" class="btn btn-outline">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M1 10l3-3 3 2 3-4 3 2"/></svg>
            Lihat Analytics
          </a>
        </div>

        <!-- Two column: recent + top scan -->
        <div class="two-col">
          <div class="card">
            <div class="card__header">
              <span class="card__title">Produk Terbaru</span>
              <a href="products.html" class="btn btn-ghost btn-sm">Lihat Semua →</a>
            </div>
            <div class="card__body" id="recent-list">
              <div class="sk" style="height:18px;margin-bottom:12px;"></div>
              <div class="sk" style="height:18px;margin-bottom:12px;width:80%;"></div>
              <div class="sk" style="height:18px;width:60%;"></div>
            </div>
          </div>
          <div class="card">
            <div class="card__header">
              <span class="card__title">Top Produk — Scan Terbanyak</span>
              <a href="analytics.html" class="btn btn-ghost btn-sm">Semua →</a>
            </div>
            <div class="card__body" id="top-list">
              <div class="sk" style="height:18px;margin-bottom:12px;"></div>
              <div class="sk" style="height:18px;margin-bottom:12px;width:80%;"></div>
              <div class="sk" style="height:18px;width:60%;"></div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <div id="toast-container"></div>

  <script src="../config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../services/auth.js"></script>
  <script src="../services/api.js"></script>
  <script src="../components/sidebar.js"></script>
  <script src="../components/toast.js"></script>
  <script src="../scripts/admin/dashboard.js"></script>
</body>
</html>
