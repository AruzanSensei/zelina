<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media — ETS Admin</title>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/admin.css">
  <style>
    .media-slot-wrap { display: flex; flex-direction: column; gap: 4px; }
    .media-img-slot {
      border: 1.5px dashed var(--border-md); border-radius: var(--r-sm);
      aspect-ratio: 4/3; overflow: hidden; cursor: pointer; position: relative;
      background: var(--gray-50); transition: border-color var(--ease), background var(--ease);
    }
    .media-img-slot:hover { border-color: var(--green); background: var(--green-light); }
    .media-img-slot img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .media-img-slot input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .media-img-slot .del-btn {
      position: absolute; top: 4px; right: 4px; z-index: 2;
      width: 22px; height: 22px; border-radius: 50%; background: rgba(192,57,43,.85);
      color: white; border: none; cursor: pointer; display: none; font-size: .75rem;
      align-items: center; justify-content: center;
    }
    .media-img-slot:hover .del-btn { display: flex; }
    .media-img-slot .empty-icon {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 4px; pointer-events: none;
    }
    .media-img-slot .empty-icon svg { color: var(--text-muted); }
    .media-img-slot .empty-icon span { font-size: .6rem; color: var(--text-muted); letter-spacing: .06em; }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside id="sidebar"></aside>
    <div class="admin-main">
      <header class="topbar">
        <button class="topbar__ham" id="ham-btn" aria-label="Toggle sidebar"></button>
        <span class="topbar__title">Media</span>
        <div class="topbar__user">
          <div class="topbar__avatar" id="user-avatar">?</div>
          <span id="user-email">—</span>
        </div>
      </header>
      <main class="page-content">
        <div class="page-header">
          <h1>Media Manager</h1>
          <p>Upload dan kelola foto setiap produk.</p>
        </div>
        <div class="toolbar">
          <div class="search-bar" style="flex:1;min-width:200px;">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><path d="M11 11l3 3" stroke-linecap="round"/></svg>
            <input type="text" id="media-search" placeholder="Cari produk...">
          </div>
        </div>
        <div id="media-grid" class="media-grid"></div>
        <div id="media-empty" class="empty-state hidden">
          <div class="empty-state__title">Belum ada produk</div>
          <div class="empty-state__sub">Tambah produk terlebih dahulu di halaman Products.</div>
        </div>
      </main>
    </div>
  </div>
  <div id="toast-container"></div>
  <script src="../config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../services/auth.js"></script>
  <script src="../services/api.js"></script>
  <script src="../services/storage.js"></script>
  <script src="../components/sidebar.js"></script>
  <script src="../components/toast.js"></script>
  <script src="../components/modal.js"></script>
  <script src="../scripts/admin/media.js"></script>
</body>
</html>
