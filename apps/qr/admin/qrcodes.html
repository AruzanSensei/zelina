<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Codes — ETS Admin</title>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/admin.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
  <div class="admin-layout">
    <aside id="sidebar"></aside>
    <div class="admin-main">
      <header class="topbar" style="justify-content: flex-start; gap: 16px;">
        <button class="topbar__ham" id="ham-btn" aria-label="Toggle sidebar"></button>
        <div style="flex: 1;"></div>
        <button onclick="location.reload()" title="Refresh" style="display:flex; align-items:center; gap:6px; padding:6px 12px; border:1px solid var(--border-md); border-radius:8px; box-shadow:var(--shadow-sm); background:var(--bg-card); color:var(--text-main); cursor:pointer; font-size:.8rem; font-weight:500;">
          <i data-lucide="refresh-cw" style="width: 14px; height: 14px;"></i> Refresh
        </button>
      </header>
      <main class="page-content">
        <div class="page-header">
          <h1>QR Codes</h1>
          <p>Generate dan download QR code untuk setiap produk.</p>
        </div>
        <div class="toolbar">
          <div class="search-bar" style="flex:1;min-width:200px;">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><path d="M11 11l3 3" stroke-linecap="round"/></svg>
            <input type="text" id="qr-search" placeholder="Cari produk...">
          </div>
          <button class="btn btn-outline" id="btn-download-all">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M7 1v8M4 7l3 3 3-3M1 11v1a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-1" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Download Semua ZIP
          </button>
        </div>
        <div id="qr-grid" class="qr-grid">
          <div class="qr-card fade-in" style="pointer-events:none; padding: 12px; gap: 8px;"><div class="sk" style="width:110px;height:110px;margin:0 auto 10px;border-radius:10px;"></div><div class="sk" style="width:60%;height:10px;margin:0 auto 6px;"></div><div class="sk" style="width:80%;height:12px;margin:0 auto;"></div></div>
          <div class="qr-card fade-in" style="pointer-events:none; padding: 12px; gap: 8px;"><div class="sk" style="width:110px;height:110px;margin:0 auto 10px;border-radius:10px;"></div><div class="sk" style="width:60%;height:10px;margin:0 auto 6px;"></div><div class="sk" style="width:80%;height:12px;margin:0 auto;"></div></div>
          <div class="qr-card fade-in" style="pointer-events:none; padding: 12px; gap: 8px;"><div class="sk" style="width:110px;height:110px;margin:0 auto 10px;border-radius:10px;"></div><div class="sk" style="width:60%;height:10px;margin:0 auto 6px;"></div><div class="sk" style="width:80%;height:12px;margin:0 auto;"></div></div>
        </div>
        <div id="qr-empty" class="empty-state hidden">
          <svg class="empty-state__icon" viewBox="0 0 56 56" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="6" y="6" width="18" height="18" rx="2"/><rect x="32" y="6" width="18" height="18" rx="2"/><rect x="6" y="32" width="18" height="18" rx="2"/><path d="M32 38h6m6 0h6M38 32v6m0 6v6"/></svg>
          <div class="empty-state__title">Belum ada produk</div>
          <div class="empty-state__sub">Tambahkan produk di halaman Products terlebih dahulu.</div>
        </div>
        <!-- QR Preview Modal -->
        <div class="modal-overlay" id="qr-preview-modal">
          <div class="modal-box" style="max-width:340px;text-align:center;">
            <div class="modal-title" id="qr-preview-title"></div>
            <div id="qr-preview-canvas" style="display:flex;justify-content:center;margin:16px 0;"></div>
            <div id="qr-preview-url" style="font-size:.72rem;color:var(--text-sub);word-break:break-all;margin-bottom:20px;font-family:var(--mono);"></div>
            <div class="modal-footer" style="justify-content:center;">
              <button class="btn btn-primary btn-sm" id="qr-preview-download">Download PNG</button>
              <button class="btn btn-outline btn-sm" id="qr-preview-close">Tutup</button>
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="../config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../services/auth.js"></script>
  <script src="../services/api.js"></script>
  <script src="../components/sidebar.js"></script>
  <script src="../components/toast.js"></script>
  <script src="../components/modal.js"></script>
  <script src="../services/storage.js"></script>
  <script src="../scripts/admin/qrcodes.js"></script>
</body>
</html>
