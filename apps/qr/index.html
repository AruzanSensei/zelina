<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Zanxa — Product Tracking</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
</head>

<body class="index-page">

  <div class="noise"></div>

  <header class="site-header">
    <div class="logo">QR<span class="accent">.</span>ZANXA</div>
    <div class="tagline">Industrial Asset Tracking</div>
  </header>

  <main class="landing-main">
    <div class="hero">
      <!-- <div class="hero-label">SISTEM PELACAKAN PRODUK</div>
      <h1 class="hero-title">Scan.<br>Track.<br>Know.</h1> -->
      <p class="hero-sub">Scan QR Code pada produk untuk melihat detail lengkap aset industri Anda.</p>
    </div>

    <div class="search-card">
      <div class="search-label">ATAU MASUKKAN ID MANUAL</div>
      <div class="search-row">
        <input type="text" id="product-id-input" placeholder="Contoh: UPS001" class="id-input" maxlength="20" />
        <button id="go-btn" class="go-btn" onclick="goToProduct()">
          <span>CARI</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>
      </div>
      <div id="search-error" class="search-error hidden">Masukkan ID produk terlebih dahulu.</div>
    </div>

    <!-- DEMO PRODUK — rendered from JSON -->
    <div class="demo-section">
      <div class="demo-label">DEMO PRODUK</div>
      <div class="demo-grid" id="demo-grid"></div>
      <button class="see-more-btn hidden" id="demo-more" onclick="toggleMore('demo')">Lihat Lebih Banyak ↓</button>
    </div>

    <!-- QR SECTION — rendered from JSON -->
    <div class="qr-section">
      <div class="demo-label">CONTOH QR CODE</div>
      <div class="qr-cards" id="qr-cards"></div>
      <button class="see-more-btn hidden" id="qr-more" onclick="toggleMore('qr')">Lihat Lebih Banyak ↓</button>
    </div>

    <!-- KELOLA -->
    <div class="demo-section">
      <div class="demo-label">KELOLA PRODUK</div>
      <a href="create.html" class="go-btn" style="display:inline-flex;text-decoration:none;margin-top:4px;">
        <span>+ TAMBAH PRODUK BARU</span>
      </a>
    </div>
  </main>

  <footer class="site-footer">
    <span>© 2024 Zanxa — MVP Demo</span>
    <span class="footer-domain">qr.zanxa.site</span>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    const WORKER_URL = 'https://qr-worker.zanxa.site';

    const LIMIT = 3;
    const state = { demo: false, qr: false };
    let products = [];

    // ── Cache config ──────────────────────────────────────────
    const CACHE_KEY = 'qr_products_list';
    const CACHE_TTL = 120 * 60 * 1000; // 20 menit

    function tryLoadCache() {
      try {
        const raw = sessionStorage.getItem(CACHE_KEY);
        const time = sessionStorage.getItem(CACHE_KEY + '_t');
        if (raw && time && Date.now() - parseInt(time) < CACHE_TTL) {
          return JSON.parse(raw);
        }
      } catch (e) { }
      return null;
    }

    function saveCache(data) {
      try {
        sessionStorage.setItem(CACHE_KEY, JSON.stringify(data));
        sessionStorage.setItem(CACHE_KEY + '_t', Date.now());
      } catch (e) { }
    }
    // ─────────────────────────────────────────────────────────

    const cached = tryLoadCache();
    if (cached) {
      products = cached;
      renderDemo();
      renderQR();
      
      // Silent revalidate
      fetch(`${WORKER_URL}/products?fields=id,nama_produk,tipe`)
        .then(res => res.ok ? res.json() : Promise.reject())
        .then(data => {
          if (Array.isArray(data)) {
            saveCache(data);
            if (JSON.stringify(data) !== JSON.stringify(products)) {
              products = data;
              renderDemo();
              renderQR();
            }
          }
        }).catch(() => {});
    } else {
      showSkeletons();
      fetch(`${WORKER_URL}/products?fields=id,nama_produk,tipe`)
        .then(res => {
          if (!res.ok) throw new Error('Worker returned ' + res.status);
          return res.json();
        })
        .then(data => {
          products = Array.isArray(data) ? data : [];
          saveCache(products);
          renderDemo();
          renderQR();
        })
        .catch(err => {
          console.error('Fetch error:', err);
          document.getElementById('demo-grid').innerHTML = `
            <div style="grid-column: 1/-1; padding: 20px; background: var(--red-bg); border: 1px solid var(--accent); border-radius: 8px; color: var(--accent); font-size: 0.8rem;">
              <strong>Gagal Memuat Data:</strong> ${err.message}<br>
              Pastikan Cloudflare Worker sudah di-deploy dan URL benar.
            </div>
          `;
          document.getElementById('qr-cards').innerHTML = '';
        });
    }

    function showSkeletons() {
      const skItem = `<div class="demo-item" style="pointer-events:none">
        <span class="demo-id" style="background:var(--border);color:transparent;border-radius:4px">LOADING</span>
        <span class="demo-name" style="background:var(--border);color:transparent;border-radius:4px">Loading product name...</span>
        <span class="demo-type" style="background:var(--border);color:transparent;border-radius:4px">Type</span>
      </div>`;
      document.getElementById('demo-grid').innerHTML = skItem.repeat(3);

      const skCard = `<div class="qr-card" style="opacity:0.4">
        <div style="width:100px;height:100px;background:var(--border);border-radius:4px"></div>
        <span style="background:var(--border);color:transparent;border-radius:4px">LOADING</span>
      </div>`;
      document.getElementById('qr-cards').innerHTML = skCard.repeat(3);
    }

    function renderDemo() {
      const grid = document.getElementById('demo-grid');
      const btn = document.getElementById('demo-more');
      const list = state.demo ? products : products.slice(0, LIMIT);

      grid.innerHTML = list.map(p => `
        <a href="product.html?id=${p.id}" class="demo-item">
          <span class="demo-id">${p.id}</span>
          <span class="demo-name">${p.nama_produk}</span>
          <span class="demo-type">${p.tipe}</span>
        </a>
      `).join('');

      if (products.length > LIMIT) {
        btn.classList.remove('hidden');
        btn.textContent = state.demo ? 'Tampilkan Lebih Sedikit ↑' : 'Lihat Lebih Banyak ↓';
      }
    }

    function renderQR() {
      const cards = document.getElementById('qr-cards');
      const btn = document.getElementById('qr-more');
      const list = state.qr ? products : products.slice(0, LIMIT);

      // Render container HTML dulu (cepat)
      cards.innerHTML = list.map(p => `
        <div class="qr-card">
          <div id="qr-${p.id}"></div>
          <span>${p.id}</span>
        </div>
      `).join('');

      // Generate QR satu per satu via rAF agar tidak block UI
      let i = 0;
      function renderNext() {
        if (i >= list.length) return;
        const p = list[i++];
        const el = document.getElementById('qr-' + p.id);
        if (el) {
          new QRCode(el, {
            text: 'https://qr.zanxa.site/product.html?id=' + p.id,
            width: 100, height: 100,
            colorDark: '#0a0a0a',
            colorLight: '#f5f0e8',
          });
        }
        requestAnimationFrame(renderNext);
      }
      requestAnimationFrame(renderNext);

      if (products.length > LIMIT) {
        btn.classList.remove('hidden');
        btn.textContent = state.qr ? 'Tampilkan Lebih Sedikit ↑' : 'Lihat Lebih Banyak ↓';
      }
    }

    function toggleMore(section) {
      state[section] = !state[section];
      if (section === 'demo') renderDemo();
      else renderQR();
    }

    document.getElementById('product-id-input').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') goToProduct();
    });

    function goToProduct() {
      const val = document.getElementById('product-id-input').value.trim().toUpperCase();
      const err = document.getElementById('search-error');
      if (!val) { err.classList.remove('hidden'); return; }
      err.classList.add('hidden');
      window.location.href = 'product.html?id=' + val;
    }
  </script>
</body>

</html>
