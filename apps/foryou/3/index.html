<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polaroid Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=DM+Serif+Display:ital@0;1&family=Karla:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF6F0;
    --cream2: #F5EFE4;
    --cream3: #EDE4D5;
    --warm-brown: #8B6F4E;
    --warm-brown-light: #C4A882;
    --ink: #3D2B1F;
    --ink-light: #6B4F3A;
    --rose: #D4977A;
    --sage: #8FA88A;
    --dust-blue: #8DA5B8;
    --polaroid-white: #FEFCF8;
    --shadow: rgba(61, 43, 31, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    font-family: 'Karla', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(212,151,122,0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(141,165,184,0.08) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='60' height='60' filter='url(%23n)' opacity='.015'/%3E%3C/svg%3E");
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem 3rem;
    border-bottom: 1px solid var(--cream3);
    background: rgba(250,246,240,0.85);
    backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .logo span { color: var(--rose); font-style: italic; }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .nav-links a {
    text-decoration: none;
    color: var(--ink-light);
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--ink); }

  .btn-create {
    background: var(--ink);
    color: var(--cream) !important;
    padding: 0.5rem 1.2rem;
    border-radius: 30px;
    font-size: 0.8rem !important;
    transition: background 0.2s, transform 0.15s !important;
  }
  .btn-create:hover { background: var(--warm-brown) !important; transform: translateY(-1px); }

  /* ── AUTH PILL ── */
  #auth-section {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .user-pill {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--cream2);
    border: 1px solid var(--cream3);
    border-radius: 30px;
    padding: 0.3rem 0.8rem 0.3rem 0.3rem;
    font-size: 0.8rem;
    color: var(--ink-light);
  }

  .user-avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    object-fit: cover;
  }

  .btn-login {
    background: var(--cream2);
    border: 1px solid var(--cream3);
    border-radius: 30px;
    padding: 0.4rem 1rem;
    font-size: 0.8rem;
    color: var(--ink-light);
    cursor: pointer;
    font-family: 'Karla', sans-serif;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    transition: all 0.2s;
  }
  .btn-login:hover { background: var(--cream3); color: var(--ink); }

  .btn-logout {
    background: none;
    border: none;
    color: var(--warm-brown-light);
    font-size: 0.75rem;
    cursor: pointer;
    font-family: 'Karla', sans-serif;
    transition: color 0.2s;
  }
  .btn-logout:hover { color: var(--rose); }

  /* ── HERO ── */
  .hero {
    text-align: center;
    padding: 4rem 2rem 2rem;
  }

  .hero-eyebrow {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--warm-brown-light);
    margin-bottom: 0.75rem;
  }

  .hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: var(--ink);
    line-height: 1.15;
    margin-bottom: 0.75rem;
  }
  .hero h1 em { color: var(--rose); }

  .hero p {
    color: var(--ink-light);
    font-size: 1rem;
    font-weight: 300;
    max-width: 480px;
    margin: 0 auto 2rem;
    line-height: 1.7;
  }

  /* ── SEARCH / FILTER BAR ── */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0 3rem;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
  }

  .search-input-wrap {
    position: relative;
    flex: 1;
    max-width: 340px;
  }

  .search-input-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
  }

  #search-input {
    width: 100%;
    padding: 0.55rem 0.75rem 0.55rem 2.2rem;
    border: 1px solid var(--cream3);
    border-radius: 30px;
    background: var(--cream2);
    font-family: 'Karla', sans-serif;
    font-size: 0.85rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  #search-input:focus { border-color: var(--warm-brown-light); }
  #search-input::placeholder { color: var(--warm-brown-light); }

  .filter-tag {
    background: var(--cream2);
    border: 1px solid var(--cream3);
    border-radius: 20px;
    padding: 0.35rem 0.85rem;
    font-size: 0.78rem;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Karla', sans-serif;
  }
  .filter-tag:hover, .filter-tag.active {
    background: var(--ink);
    color: var(--cream);
    border-color: var(--ink);
  }

  /* ── MASONRY GALLERY ── */
  .gallery {
    padding: 0 2.5rem 4rem;
    columns: 4 240px;
    column-gap: 1.5rem;
  }

  /* ── POLAROID CARD ── */
  .polaroid-wrap {
    break-inside: avoid;
    margin-bottom: 1.5rem;
    display: inline-block;
    width: 100%;
    cursor: pointer;
  }

  .polaroid {
    background: var(--polaroid-white);
    border-radius: 2px;
    padding: 10px 10px 36px;
    box-shadow:
      0 2px 8px var(--shadow),
      0 8px 24px rgba(61,43,31,0.08),
      inset 0 0 0 0.5px rgba(255,255,255,0.8);
    transform: rotate(var(--rot, 0deg));
    transition: transform 0.3s cubic-bezier(.2,.8,.4,1), box-shadow 0.3s;
    position: relative;
  }

  .polaroid:hover {
    transform: rotate(0deg) translateY(-4px) scale(1.02);
    box-shadow:
      0 12px 32px rgba(61,43,31,0.18),
      0 4px 12px rgba(61,43,31,0.1),
      inset 0 0 0 0.5px rgba(255,255,255,0.8);
    z-index: 10;
  }

  .polaroid img {
    width: 100%;
    display: block;
    object-fit: cover;
    border-radius: 1px;
    background: var(--cream2);
  }

  .polaroid-img-multi {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3px;
  }
  .polaroid-img-multi img { height: 90px; }
  .polaroid-img-multi img:first-child:nth-last-child(1) { grid-column: 1/-1; height: auto; }

  .polaroid-caption {
    padding: 10px 2px 0;
    font-family: 'Caveat', cursive;
    font-size: 1rem;
    color: var(--ink-light);
    line-height: 1.3;
    text-align: center;
  }

  .polaroid-caption .caption-title {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--ink);
  }

  .polaroid-caption .caption-user {
    font-size: 0.82rem;
    color: var(--warm-brown-light);
  }

  .polaroid-pin {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    width: 18px;
    height: 18px;
    background: radial-gradient(circle at 40% 35%, #f0c0a0, var(--rose) 60%);
    border-radius: 50%;
    box-shadow: 0 2px 4px rgba(61,43,31,0.25), 0 1px 0 rgba(255,255,255,0.4) inset;
  }

  .polaroid-tape {
    position: absolute;
    height: 20px;
    width: 50px;
    background: rgba(212,151,122,0.25);
    border: 0.5px solid rgba(212,151,122,0.3);
    top: -8px;
    left: 50%;
    transform: translateX(-50%) rotate(-1.5deg);
    border-radius: 1px;
  }

  /* ── USER HEADER IN CARD ── */
  .card-user {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0.5rem 0.6rem 0;
  }

  .card-user-avatar {
    width: 20px; height: 20px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--cream3);
  }

  .card-user-name {
    font-size: 0.72rem;
    color: var(--warm-brown-light);
    font-weight: 500;
    letter-spacing: 0.03em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 120px;
  }

  /* ── LIGHTBOX ── */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(40,28,20,0.88);
    backdrop-filter: blur(12px);
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .lightbox.open { display: flex; }

  .lightbox-inner {
    background: var(--polaroid-white);
    border-radius: 2px;
    padding: 14px 14px 52px;
    max-width: 680px;
    width: 100%;
    position: relative;
    box-shadow: 0 32px 80px rgba(40,28,20,0.5);
    animation: lb-in 0.3s cubic-bezier(.2,.8,.4,1);
  }

  @keyframes lb-in {
    from { opacity: 0; transform: scale(0.92) translateY(20px); }
    to { opacity: 1; transform: none; }
  }

  .lightbox-imgs {
    display: grid;
    gap: 6px;
  }

  .lightbox-imgs img {
    width: 100%;
    display: block;
    object-fit: contain;
    max-height: 60vh;
    border-radius: 1px;
    background: var(--cream2);
  }

  .lightbox-imgs.grid-multi {
    grid-template-columns: 1fr 1fr;
  }
  .lightbox-imgs.grid-multi img { max-height: 30vh; object-fit: cover; }

  .lightbox-meta {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 10px 16px;
    text-align: center;
    font-family: 'Caveat', cursive;
  }

  .lightbox-title {
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--ink);
  }

  .lightbox-sub {
    font-size: 1rem;
    color: var(--ink-light);
  }

  .lightbox-close {
    position: absolute;
    top: -14px; right: -14px;
    width: 32px; height: 32px;
    background: var(--ink);
    color: var(--cream);
    border: none;
    border-radius: 50%;
    font-size: 1.1rem;
    line-height: 32px;
    text-align: center;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    transition: background 0.2s;
  }
  .lightbox-close:hover { background: var(--rose); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 5rem 2rem;
    color: var(--warm-brown-light);
  }
  .empty-state .es-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
    opacity: 0.4;
  }
  .empty-state p { font-size: 0.9rem; }

  /* ── LOADING SKELETON ── */
  .skeleton-wrap {
    padding: 0 2.5rem;
    columns: 4 240px;
    column-gap: 1.5rem;
  }

  .skeleton {
    break-inside: avoid;
    margin-bottom: 1.5rem;
    background: var(--polaroid-white);
    border-radius: 2px;
    padding: 10px 10px 36px;
    box-shadow: 0 2px 8px var(--shadow);
    animation: sk-pulse 1.5s ease-in-out infinite;
  }

  .skeleton-img {
    background: var(--cream2);
    border-radius: 1px;
    width: 100%;
  }

  @keyframes sk-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--ink);
    color: var(--cream);
    padding: 0.7rem 1.5rem;
    border-radius: 30px;
    font-size: 0.85rem;
    transition: transform 0.3s cubic-bezier(.2,.8,.4,1);
    z-index: 9999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 768px) {
    header { padding: 1rem 1.5rem; }
    .filter-bar { padding: 0 1.5rem; }
    .gallery { padding: 0 1rem 3rem; columns: 2 140px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">pola<span>roid</span></div>
  <nav class="nav-links">
    <a href="index.html">Galeri</a>
    <a href="create.html" class="btn-create">+ Buat Baru</a>
  </nav>
  <div id="auth-section">
    <button class="btn-login" id="btn-login" onclick="loginWithGoogle()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Masuk dengan Google
    </button>
  </div>
</header>

<section class="hero">
  <p class="hero-eyebrow">Koleksi foto kenangan</p>
  <h1>Galeri <em>Polaroid</em> bersama</h1>
  <p>Simpan momen favoritmu dalam bingkai polaroid klasik. Bagikan dan nikmati kenangan bersama.</p>
</section>

<div class="filter-bar">
  <div class="search-input-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search-input" placeholder="Cari nama, pengguna...">
  </div>
  <button class="filter-tag active" onclick="setFilter('all', this)">Semua</button>
  <button class="filter-tag" onclick="setFilter('recent', this)">Terbaru</button>
  <button class="filter-tag" onclick="setFilter('mine', this)">Punyaku</button>
</div>

<div id="gallery-loading" class="skeleton-wrap">
  <div class="skeleton"><div class="skeleton-img" style="height:180px"></div></div>
  <div class="skeleton"><div class="skeleton-img" style="height:140px"></div></div>
  <div class="skeleton"><div class="skeleton-img" style="height:220px"></div></div>
  <div class="skeleton"><div class="skeleton-img" style="height:160px"></div></div>
  <div class="skeleton"><div class="skeleton-img" style="height:200px"></div></div>
  <div class="skeleton"><div class="skeleton-img" style="height:130px"></div></div>
</div>

<div id="gallery" class="gallery" style="display:none"></div>
<div id="empty-state" class="empty-state" style="display:none">
  <div class="es-icon">📷</div>
  <p>Belum ada foto di sini.<br>Jadilah yang pertama menambahkan!</p>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
  <div class="lightbox-inner" id="lb-inner">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <div class="lightbox-imgs" id="lb-imgs"></div>
    <div class="lightbox-meta">
      <div class="lightbox-title" id="lb-title"></div>
      <div class="lightbox-sub" id="lb-sub"></div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const SUPABASE_URL = 'https://cxtmilenczpjetlnqiwo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN4dG1pbGVuY3pwamV0bG5xaXdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTEzMTUsImV4cCI6MjA5Mjc4NzMxNX0.OpTsBgQACFzE4ipIuOiTFaf-ldscH_hnTDQdY0U52AY';
const WORKER_URL   = 'https://polaroid-auth.YOUR_SUBDOMAIN.workers.dev'; // ← ganti setelah deploy Worker
const STORAGE_BUCKET = 'polaroid-photos';

// ── STATE ───────────────────────────────────────────────
let currentUser = null;
let allPosts = [];
let activeFilter = 'all';

// ── AUTH ────────────────────────────────────────────────
function loginWithGoogle() {
  // Redirect ke Worker yang handle OAuth Google
  window.location.href = WORKER_URL + '/auth/google';
}

function logout() {
  localStorage.removeItem('polaroid_session');
  currentUser = null;
  renderAuthUI();
  showToast('Berhasil keluar');
  loadGallery();
}

function parseSession() {
  const raw = localStorage.getItem('polaroid_session');
  if (!raw) return null;
  try { return JSON.parse(raw); } catch { return null; }
}

function renderAuthUI() {
  const sec = document.getElementById('auth-section');
  if (currentUser) {
    sec.innerHTML = `
      <div class="user-pill">
        <img class="user-avatar" src="${currentUser.avatar_url || ''}" onerror="this.style.display='none'" alt="">
        <span>${currentUser.name || currentUser.email}</span>
      </div>
      <button class="btn-logout" onclick="logout()">Keluar</button>
    `;
  } else {
    sec.innerHTML = `
      <button class="btn-login" id="btn-login" onclick="loginWithGoogle()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 2.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Masuk dengan Google
      </button>
    `;
  }
}

// ── LOAD GALLERY ────────────────────────────────────────
async function loadGallery() {
  const loadEl = document.getElementById('gallery-loading');
  const galleryEl = document.getElementById('gallery');
  const emptyEl = document.getElementById('empty-state');

  loadEl.style.display = 'block';
  galleryEl.style.display = 'none';
  emptyEl.style.display = 'none';

  try {
    let url = SUPABASE_URL + '/rest/v1/polaroid_posts?select=*,users(name,email,avatar_url)&order=created_at.desc&limit=80';

    if (activeFilter === 'mine' && currentUser) {
      url = SUPABASE_URL + '/rest/v1/polaroid_posts?select=*,users(name,email,avatar_url)&user_id=eq.' + currentUser.id + '&order=created_at.desc';
    }

    const res = await fetch(url, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });

    const data = await res.json();
    allPosts = Array.isArray(data) ? data : [];

    loadEl.style.display = 'none';
    renderGallery(allPosts);

  } catch (e) {
    loadEl.style.display = 'none';
    emptyEl.style.display = 'block';
    console.error(e);
  }
}

function renderGallery(posts) {
  const galleryEl = document.getElementById('gallery');
  const emptyEl = document.getElementById('empty-state');

  const q = document.getElementById('search-input').value.toLowerCase().trim();
  let filtered = posts;
  if (q) {
    filtered = posts.filter(p =>
      (p.title || '').toLowerCase().includes(q) ||
      (p.description || '').toLowerCase().includes(q) ||
      (p.users?.name || '').toLowerCase().includes(q) ||
      (p.users?.email || '').toLowerCase().includes(q)
    );
  }

  if (!filtered.length) {
    galleryEl.style.display = 'none';
    emptyEl.style.display = 'block';
    return;
  }

  galleryEl.style.display = 'block';
  emptyEl.style.display = 'none';

  const rotations = [-2, -1, 0, 1, 2, -1.5, 1.5, -0.5, 0.5];
  galleryEl.innerHTML = filtered.map((post, i) => {
    const urls = parseUrls(post.image_urls);
    const rot = rotations[i % rotations.length];
    const tapeOrPin = i % 3 === 0
      ? '<div class="polaroid-pin"></div>'
      : '<div class="polaroid-tape"></div>';

    const userName = post.users?.name || post.users?.email || 'Anonim';
    const avatarUrl = post.users?.avatar_url || '';

    let imgHtml = '';
    if (urls.length === 1) {
      imgHtml = `<img src="${urls[0]}" alt="${post.title || ''}" loading="lazy">`;
    } else if (urls.length >= 2) {
      imgHtml = `<div class="polaroid-img-multi">${urls.slice(0,4).map(u => `<img src="${u}" loading="lazy">`).join('')}</div>`;
    } else {
      imgHtml = `<div style="height:140px;background:var(--cream2);border-radius:1px;display:flex;align-items:center;justify-content:center;opacity:.4;font-size:2rem;">📷</div>`;
    }

    return `
      <div class="polaroid-wrap" onclick="openLightbox(${i})">
        <div class="polaroid" style="--rot:${rot}deg">
          ${tapeOrPin}
          ${imgHtml}
          <div class="polaroid-caption">
            <div class="caption-title">${esc(post.title || 'Tanpa judul')}</div>
            <div class="card-user" style="justify-content:center">
              ${avatarUrl ? `<img class="card-user-avatar" src="${avatarUrl}" onerror="this.style.display='none'">` : ''}
              <span class="card-user-name">${esc(userName)}</span>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function parseUrls(raw) {
  if (!raw) return [];
  if (Array.isArray(raw)) return raw.filter(Boolean);
  try {
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed.filter(Boolean) : [];
  } catch { return []; }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── LIGHTBOX ────────────────────────────────────────────
function openLightbox(idx) {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  let filtered = allPosts;
  if (q) filtered = allPosts.filter(p =>
    (p.title||'').toLowerCase().includes(q)||(p.users?.name||'').toLowerCase().includes(q)
  );

  const post = filtered[idx];
  if (!post) return;
  const urls = parseUrls(post.image_urls);
  const lb = document.getElementById('lightbox');
  const imgs = document.getElementById('lb-imgs');
  const title = document.getElementById('lb-title');
  const sub = document.getElementById('lb-sub');

  if (urls.length > 1) {
    imgs.className = 'lightbox-imgs grid-multi';
    imgs.innerHTML = urls.map(u => `<img src="${u}">`).join('');
  } else if (urls.length === 1) {
    imgs.className = 'lightbox-imgs';
    imgs.innerHTML = `<img src="${urls[0]}">`;
  } else {
    imgs.className = 'lightbox-imgs';
    imgs.innerHTML = `<div style="height:200px;background:var(--cream2);display:flex;align-items:center;justify-content:center;opacity:.4;font-size:3rem">📷</div>`;
  }

  title.textContent = post.title || 'Tanpa judul';
  const user = post.users?.name || post.users?.email || 'Anonim';
  const date = post.created_at ? new Date(post.created_at).toLocaleDateString('id-ID', {day:'numeric',month:'long',year:'numeric'}) : '';
  sub.textContent = `oleh ${user}${date ? ' · ' + date : ''}${post.description ? ' — ' + post.description : ''}`;

  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox(e) {
  if (e && e.target !== document.getElementById('lightbox')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

// ── FILTER / SEARCH ─────────────────────────────────────
function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  loadGallery();
}

document.getElementById('search-input').addEventListener('input', () => {
  renderGallery(allPosts);
});

// ── TOAST ───────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── INIT ────────────────────────────────────────────────
function init() {
  // Cek apakah ada session dari OAuth callback
  const params = new URLSearchParams(location.search);
  if (params.get('session')) {
    try {
      const session = JSON.parse(atob(params.get('session')));
      localStorage.setItem('polaroid_session', JSON.stringify(session));
      currentUser = session.user;
      history.replaceState({}, '', location.pathname);
      showToast('Selamat datang, ' + (currentUser.name || currentUser.email) + '!');
    } catch {}
  } else {
    const session = parseSession();
    if (session) currentUser = session.user;
  }

  renderAuthUI();
  loadGallery();
}

init();
</script>
