<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zanxa AI</title>
    <meta name="description" content="Zanxa AI — Your intelligent assistant powered by Gemini.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- App Layout -->
    <div class="app-layout">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <!-- <div class="brand-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 8V4H8"></path>
                            <rect width="16" height="12" x="4" y="8" rx="2"></rect>
                            <path d="M2 14h2"></path>
                            <path d="M20 14h2"></path>
                            <path d="M15 13v2"></path>
                            <path d="M9 13v2"></path>
                        </svg>
                    </div> -->
                    <span class="brand-name">Zanxa AI</span>
                </div>
                <button class="icon-btn" id="new-chat-btn" title="New Chat" aria-label="New Chat">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14" />
                    </svg>
                </button>
            </div>

            <div class="sidebar-content">
                <p class="sidebar-label">Riwayat Chat</p>
                <div class="chat-history" id="chat-history">
                    <div class="history-empty">
                        <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor"
                            stroke-width="1.5">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                        </svg>
                        <p>Belum ada percakapan</p>
                    </div>
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="sidebar-btn theme-toggle" id="theme-toggle" aria-label="Toggle theme">
                    <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <circle cx="12" cy="12" r="5" />
                        <line x1="12" y1="1" x2="12" y2="3" />
                        <line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                    </svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                    </svg>
                    <span>Ubah Tema</span>
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <div class="chat-area">

            <!-- Top Bar -->
            <header class="topbar">
                <button class="icon-btn" id="sidebar-toggle" aria-label="Toggle Sidebar">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <line x1="3" y1="12" x2="21" y2="12" />
                        <line x1="3" y1="18" x2="21" y2="18" />
                    </svg>
                </button>
                <div class="topbar-center">
                    <span class="model-badge">
                        <!-- <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M12 8v4l3 3" />
                        </svg> -->
                        gemini-3-flash
                    </span>
                </div>
                <button class="icon-btn" id="clear-chat-btn" title="Clear Chat" aria-label="Clear Chat">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="1 4 1 10 7 10" />
                        <path d="M3.51 15a9 9 0 1 0 .49-3.51" />
                    </svg>
                </button>
            </header>

            <!-- Messages -->
            <main class="messages-container" id="messages-container">

                <!-- Welcome / Empty State -->
                <div class="welcome-screen" id="welcome-screen">
                    <!-- <div class="welcome-icon">
                        <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 8V4H8"></path>
                            <rect width="16" height="12" x="4" y="8" rx="2"></rect>
                            <path d="M2 14h2"></path>
                            <path d="M20 14h2"></path>
                            <path d="M15 13v2"></path>
                            <path d="M9 13v2"></path>
                        </svg>
                    </div> -->
                    <h1>Ada yang bisa dibantu?</h1>
                    <p class="welcome-sub">Tanyakan apa saja — Saya AI buatan Zanxa.</p>
                </div>

                <!-- Chat Messages -->
                <div class="messages-list" id="messages-list"></div>

            </main>

            <!-- Input Area -->
            <footer class="input-area">
                <div class="input-wrapper">
                    <textarea id="message-input" class="message-input" placeholder="Ketik pesan..." rows="1"
                        aria-label="Chat input"></textarea>
                    <button class="send-btn" id="send-btn" aria-label="Kirim pesan" disabled>
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                        </svg>
                    </button>
                </div>
                <p class="input-disclaimer">Zanxa AI dapat membuat kesalahan.
                </p>
            </footer>

        </div>
    </div>

    <!-- Username Modal Overlay -->
    <div id="username-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                <h2>Siapa nama kamu?</h2>
            </div>
            <form id="username-form">
                <input type="text" id="username-input" placeholder="Masukkan nama panggilan..." required
                    autocomplete="off">
                <button type="submit" class="btn-primary">Mulai Ngobrol</button>
            </form>
        </div>
    </div>

    <!-- Marked.js for better Markdown parsing (code copy, lists, etc) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
