<!DOCTYPE html>
<html lang="id" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarkPDF — Markdown to PDF Converter</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
</head>

<body>

  <header>
    <div class="logo">
      <div class="logo-mark">MD</div>
      Mark<span>PDF</span>
    </div>
    <div class="header-pill">
      <div class="dot"></div>
      Markdown → PDF Converter
    </div>
    <div class="btn-group">
      <button class="btn btn-ghost" onclick="clearAll()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="1 4 1 10 7 10" />
          <path d="M3.51 15a9 9 0 1 0 .49-3.14" />
        </svg>
        Reset
      </button>
      <button class="btn btn-ghost" onclick="loadSample()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
        </svg>
        Contoh
      </button>
      <button class="btn btn-accent" onclick="printPDF()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 6 2 18 2 18 9" />
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
          <rect x="6" y="14" width="12" height="8" />
        </svg>
        Unduh PDF
      </button>
    </div>
  </header>

  <main>
    <div class="panel panel-left">
      <div class="panel-header">
        <span class="panel-title">Editor</span>
        <div class="btn-group">
          <div class="fmt-bar">
            <button class="fmt-btn" title="Bold" onclick="insertFmt('**','**')"><b>B</b></button>
            <button class="fmt-btn" title="Italic" onclick="insertFmt('*','*')"><i>I</i></button>
            <button class="fmt-btn" title="Strikethrough" onclick="insertFmt('~~','~~')"><s>S</s></button>
            <button class="fmt-btn" title="Code" onclick="insertFmt('`','`')">⌥</button>
            <button class="fmt-btn" title="Heading 1" onclick="insertLine('# ')">H1</button>
            <button class="fmt-btn" title="Heading 2" onclick="insertLine('## ')">H2</button>
            <button class="fmt-btn" title="Link" onclick="insertFmt('[','](url)')">🔗</button>
            <button class="fmt-btn" title="Blockquote" onclick="insertLine('> ')">❝</button>
            <button class="fmt-btn" title="Code Block" onclick="insertCodeBlock()">{ }</button>
          </div>
          <label class="btn btn-ghost" style="cursor:pointer">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            Impor .md
            <input type="file" accept=".md,.txt" onchange="importFile(event)" style="display:none">
          </label>
          <span class="badge" id="page-count">0 hal</span>
        </div>
      </div>
      <div class="editor-wrap" id="editor-wrap">
        <div class="drop-overlay">Lepaskan file .md di sini</div>
        <textarea id="md-input"
          placeholder="Ketik atau tempel Markdown di sini…&#10;&#10;Mendukung: # Headings, **bold**, *italic*, `code`, > blockquote, ``` code block, tabel, list, dll."
          spellcheck="false"></textarea>
        <div class="char-count" id="char-count">0 karakter</div>
      </div>
    </div>

    <div class="panel panel-right">
      <div class="panel-header">
        <span class="panel-title">Preview A4</span>
        <div class="btn-group">
          <span class="badge" id="word-count">0 kata</span>
          <button class="btn btn-ghost" onclick="toggleTheme()" id="theme-btn">🌙 Gelap</button>
        </div>
      </div>
      <div class="preview-scroll" id="preview-scroll"></div>
    </div>
  </main>

  <div class="toast" id="toast"></div>
  <iframe id="print-frame" style="position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;border:none"></iframe>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script type="module" src="app.js"></script>
</body>

</html>
